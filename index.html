<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Registration | Internship Portal</title>
    <link rel="stylesheet" href="styles.css?v=1.1">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="wrapper">
        <span class="bg-animate"></span>
        <span class="bg-animate2"></span>

        <div class="form-box login">
            <h2 id="errorBox" style="color:#ff4d4d; font-size: 14px; text-align:center; display:none;">Invalid Credentials</h2>
            <form id="loginForm" action="login.php" method="POST">
                <h1>Login</h1>
                <div class="input-box">
                    <input type="text" id="loginUsername" name="username" required>
                    <label>Username</label>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="password" id="loginPassword" name="password" required>
                    <label>Password</label>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <button type="submit" class="btn" onclick="handleLogin()">Login</button>
                <div class="logreg-link">
                    <p>Don't have an account? <a href="#" class="register-link">Sign Up</a></p>
                </div>
            </form>
        </div>

        <div class="info-text login">
            <h2>Welcome Back!</h2>
            <p>Ready to find your next opportunity? Log in to your portal.</p>
        </div>

        <div class="form-box register">
            <form id="registerForm" action="register.php" method="POST">
                <h1>Sign Up</h1>
                <div class="input-box">
                    <input type="text" id="name" name="name" required>
                    <label>Full Name</label>
                    <i class='bx bxs-user-detail'></i>
                </div>
                <div class="input-box">
                    <input type="email" id="email" name="email" required>
                    <label>Email</label>
                    <i class='bx bxs-envelope'></i>
                </div>
                <div class="input-box">
                    <input type="text" name="username" required>
                    <label>Username</label>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                    <input type="password" id="password" name="password" required>
                    <label>Password</label>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <button type="submit" class="btn">Sign Up</button>
                <div class="logreg-link">
                    <p>Already have an account? <a href="#" class="login-link">Login</a></p>
                </div>
            </form>
        </div>

        <div class="info-text register">
            <h2>Join Us!</h2>
            <p>Create an account to start applying for top internships.</p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Check for login errors
        const params = new URLSearchParams(window.location.search);
        if(params.get("error") === "1"){
            document.getElementById("errorBox").style.display = "block";
        }
        
        // This function should run when the user clicks the "Login" button
        function handleLogin() {
            // This clears the "Applied" notebook in the browser
            localStorage.removeItem('appliedJobs'); 
        
            // Then proceed with your normal login logic/form submission
            return true; 
        }
    </script>
</body>
</html>
